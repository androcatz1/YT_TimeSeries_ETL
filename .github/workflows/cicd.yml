name: Build and Push to GCP

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{secrets.GCP_SA_KEY}}

      - name: Setup Gcloud
        uses: google-github-actions/setup-gcloud@v2   
        with:
          project_id: vaulted-bonsai-487010-t7

      - name: Configure Docker
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build Image
        run: docker build -t yt-etl:${{ github.sha }} .

      - name: Give Docker File Tag in Artifact Registry
        run: |
          docker tag yt-etl:${{ github.sha }} \
          asia-southeast1-docker.pkg.dev/vaulted-bonsai-487010-t7/yt-etl-images/yt_etl:${{ github.sha }} 

      - name: Push image to Artifact Registry
        run: docker push asia-southeast1-docker.pkg.dev/vaulted-bonsai-487010-t7/yt-etl-images/yt_etl:${{ github.sha }}   

      - name: Deploy to Cloud Run Job
        run: |
          gcloud run jobs update yt-etl-job \
            --image asia-southeast1-docker.pkg.dev/vaulted-bonsai-487010-t7/yt-etl-images/yt_etl:${{ github.sha }} \
            --region asia-southeast1
